{% extends 'base.html' %}
{% block title %}Modifier l'annonce{% endblock %}
{% block content %}
<h1>Modifier l'annonce</h1>
<p><strong>ID Annonce :</strong> {{ offer.id }}</p>
<form method="post" class="create-ad-form">
  <section class="form-block" style="display:grid;gap:1.5rem;grid-template-columns:repeat(2, 1fr);">
    <h3 style="grid-column:1/3">Informations générales</h3>
    
    <div class="form-field" style="grid-column:1/3">
      <label>Titre
        <input type="text" name="title" value="{{ offer.title }}" maxlength="255">
      </label>
    </div>

    <div class="form-field">
      <label>Je souhaite
        <select name="side">
          <option value="buy" {% if ad.side=='buy' %}selected{% endif %}>Acheter</option>
          <option value="sell" {% if ad.side=='sell' %}selected{% endif %}>Vendre</option>
        </select>
      </label>
    </div>

    <div class="form-field">
      <label>Cryptomonnaie
        <select name="crypto">
          <option value="XMR" {% if ad.crypto=='XMR' %}selected{% endif %}>Monero (XMR)</option>
        </select>
      </label>
    </div>

    <div class="form-field">
      <label>Pays de l'annonce
        <input type="text" name="country" value="{{ ad.country }}" placeholder="ex: FR">
      </label>
    </div>

    <div class="form-field">
      <label>Devise locale
        <select name="fiat" id="fiat_select">
          <option value="EUR" {% if ad.fiat=='EUR' %}selected{% endif %}>EUR</option>
          <option value="USD" {% if ad.fiat=='USD' %}selected{% endif %}>USD</option>
          <option value="RUB" {% if ad.fiat=='RUB' %}selected{% endif %}>RUB</option>
        </select>
      </label>
    </div>
  </section>

  <section class="form-block" style="display:grid;gap:1.5rem;grid-template-columns:repeat(2, 1fr);">
    <h3 style="grid-column:1/3">Réglage du prix</h3>

    <div class="form-field" style="grid-column:1/3">
      <label>Mode de prix
        <select name="price_mode" id="price_mode">
          <option value="market" {% if ad.price_mode=='market' %}selected{% endif %}>Prix du marché</option>
          <option value="equation" {% if ad.price_mode=='equation' %}selected{% endif %}>Équation de prix</option>
          <option value="fixed" {% if ad.price_mode=='fixed' %}selected{% endif %}>Prix fixe</option>
        </select>
      </label>
    </div>

    <div class="form-field" id="price_margin_group">
      <label>Marge (%)
        <input type="number" name="margin" step="0.1" value="{{ ad.margin }}">
      </label>
    </div>

    <div class="form-field" id="price_fixed_group">
      <label>Prix fixe ({{ ad.fiat }} / XMR)
        <input type="number" name="fixed_price" step="0.01" value="{{ ad.fixed_price or '' }}">
      </label>
    </div>

    <div class="form-field" id="price_equation_group" style="grid-column:1/3">
      <label>Équation de prix
        <input type="text" name="pricing_equation" value="{{ ad.pricing_equation }}" placeholder="ex: market_price * 1.10">
      </label>
    </div>

    <div class="form-field result-price" id="result_price" style="grid-column:1/3;">
      <strong>Prix résultant :</strong> <span id="result_price_value">—</span> pour 1 XMR
    </div>
  </section>

  <section class="form-block">
    <h3>Horaires</h3>
    <div class="form-field">
      <label style="flex-direction:row; align-items:center; gap:8px;">
        <input type="radio" name="schedule_mode" value="24h" {% if ad.schedule and ad.schedule.mode=='24h' %}checked{% endif %} style="width:auto;"> 
        24 heures (toujours visible)
      </label>
    </div>
    <div class="form-field">
      <label style="flex-direction:row; align-items:center; gap:8px;">
        <input type="radio" name="schedule_mode" value="weekly" {% if ad.schedule and ad.schedule.mode=='weekly' %}checked{% endif %} style="width:auto;"> 
        Garder hebdomadaire (inchangé)
      </label>
    </div>
  </section>

  <section class="form-block">
    <h3>Paiement et limites</h3>
    
    <div class="form-field">
      <label>Méthode de paiement
        <select name="payment_method">
          {% set pm = ad.payment_method or (ad.payment_methods|first) %}
          <option {% if pm=='Bank Transfer' %}selected{% endif %}>Virement bancaire</option>
          <option {% if pm=='Revolut' %}selected{% endif %}>Revolut</option>
          <option {% if pm=='Paysafecard' %}selected{% endif %}>Paysafecard</option>
          <option {% if pm=='Crypto (BTC)' %}selected{% endif %}>Crypto (BTC)</option>
          <option {% if pm=='Crypto (ETH)' %}selected{% endif %}>Crypto (ETH)</option>
        </select>
      </label>
    </div>

    <div class="form-field">
      <label>Texte promotionnel
        <input type="text" name="promo_text" maxlength="255" value="{{ ad.promo_text }}">
      </label>
    </div>

    <div class="form-field">
      <label>Limite min (XMR)
        <input type="number" name="min_limit" step="0.0001" min="0.0001" value="{{ ad.min_limit }}" placeholder="0.0001">
        <small class="field-help">Min: 0.0001 XMR</small>
      </label>
    </div>

    <div class="form-field">
      <label>Limite max (XMR)
        <input type="number" name="max_limit" step="0.0001" min="0.0001" value="{{ ad.max_limit }}" placeholder="10.0">
        <small class="field-help">Min: 0.0001 XMR</small>
      </label>
    </div>

    <div class="form-field">
      <label>Temps d'escrow (minutes)
        <input type="number" name="escrow_minutes" value="{{ ad.escrow_minutes or 60 }}">
      </label>
    </div>

    <div class="form-field" style="display:flex; gap:20px;">
      <label style="flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" name="req_phone" {% if ad.req_phone %}checked{% endif %} style="width:auto;"> 
        Téléphone confirmé
      </label>
      <label style="flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" name="req_id" {% if ad.req_id %}checked{% endif %} style="width:auto;"> 
        Identité confirmée
      </label>
    </div>
  </section>

  <section class="form-block">
    <h3>Conditions et Statut</h3>
    <div class="form-field">
      <label>Conditions d'échange
        <textarea name="trade_conditions" rows="4">{{ ad.trade_conditions }}</textarea>
      </label>
    </div>
    <div class="form-field">
      <label>Statut
        <select name="status">
          <option value="open" {% if offer.status=='open' %}selected{% endif %}>ouvert</option>
          <option value="disabled" {% if offer.status=='disabled' %}selected{% endif %}>désactivé</option>
          <option value="closed" {% if offer.status=='closed' %}selected{% endif %}>fermé</option>
        </select>
      </label>
    </div>
  </section>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
    <a href="{{ url_for('my_ads') }}" class="btn" style="margin-left:12px;">Annuler</a>
  </div>
</form>

<script>
  // Injected from server: cached market prices per fiat (EUR, USD, ...)
  const MARKET_PRICES = {{ (market_prices or {}) | tojson }};
  function getMarketBase(fiat) {
    if (!fiat) return undefined;
    const key = String(fiat).toUpperCase();
    const val = MARKET_PRICES ? MARKET_PRICES[key] : undefined;
    const num = typeof val === 'number' ? val : parseFloat(val);
    return isNaN(num) ? undefined : num;
  }
  function round2(n){ return Math.round(n * 100) / 100; }
  function updateResultPrice() {
    const mode = document.getElementById('price_mode').value;
    const fiatSel = document.getElementById('fiat_select');
    const fiat = fiatSel ? fiatSel.value : 'EUR';
    const marginInput = document.querySelector('input[name="margin"]');
    const fixedInput = document.querySelector('input[name="fixed_price"]');
    const marginGroup = document.getElementById('price_margin_group');
    const fixedGroup = document.getElementById('price_fixed_group');
    const equationGroup = document.getElementById('price_equation_group');
    
    let text = '—';
    if (mode === 'market') {
      if (marginGroup) marginGroup.style.display = 'block';
      if (fixedGroup) fixedGroup.style.display = 'none';
      if (equationGroup) equationGroup.style.display = 'none';
      
      let m = parseFloat(marginInput && marginInput.value ? marginInput.value : '0');
      if (isNaN(m)) m = 0;
      const base = getMarketBase(fiat);
      if (typeof base === 'number') {
        const price = round2(base * (1 + m / 100));
        text = price + ' ' + fiat;
      } else {
        text = '—';
      }
    } else if (mode === 'fixed') {
      if (marginGroup) marginGroup.style.display = 'none';
      if (fixedGroup) fixedGroup.style.display = 'block';
      if (equationGroup) equationGroup.style.display = 'none';

      const fp = parseFloat(fixedInput && fixedInput.value ? fixedInput.value : '');
      if (!isNaN(fp)) {
        const price = round2(fp);
        text = price + ' ' + fiat;
      } else {
        text = '—';
      }
    } else if (mode === 'equation') {
      if (marginGroup) marginGroup.style.display = 'none';
      if (fixedGroup) fixedGroup.style.display = 'none';
      if (equationGroup) equationGroup.style.display = 'block';
      text = 'Utiliser l\'équation de prix';
    }
    const span = document.getElementById('result_price_value');
    if (span) span.textContent = text;
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('price_mode').addEventListener('change', updateResultPrice);
    const marginInput = document.querySelector('input[name="margin"]');
    const fixedInput = document.querySelector('input[name="fixed_price"]');
    const fiatSel = document.getElementById('fiat_select');
    if (marginInput) marginInput.addEventListener('input', updateResultPrice);
    if (fixedInput) fixedInput.addEventListener('input', updateResultPrice);
    if (fiatSel) fiatSel.addEventListener('change', updateResultPrice);
    updateResultPrice();
  });
</script>
{% endblock %}
