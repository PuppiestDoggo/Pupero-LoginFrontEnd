{% extends 'base.html' %}
{% set hide_header = True %}
{% block title %}Enregistrer{% endblock %}

    {%block css %}
    <!-- CSS components -->
    <link rel="stylesheet" href="{{url_for('static', filename='css/components.css') }}">
    <!-- CSS login -->
    <link rel="stylesheet" href="{{url_for('static', filename='css/pages/login.css') }}">
    {% endblock %}

{% block content %}
<div class="login-grid">

  <div class="login-left">
    <img class="login-logo"
         src="{{ url_for('static', filename='login_logo.png') }}"
         alt="Pupero logo"
         onerror="this.style.display='none'">
  </div>

  <div class="login-right">
    <h1>Créer un compte</h1>
    <p class="login-info">
      Rejoignez Pupero pour accéder au marché
    </p>

    <form method="post" class="login-form">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" required placeholder="Choisissez un pseudonyme">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="votre@email.com">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>

      <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px; margin-top: 1rem; margin-bottom: 1.5rem;">
        <input type="checkbox" id="accept_terms" name="accept_terms" required style="margin-top: 4px; width: auto;">
        <label for="accept_terms" style="font-size: 0.9rem; font-weight: 400; cursor: pointer;">
          J'accepte les <a href="{{ url_for('terms') }}" target="_blank" style="color: var(--primary); text-decoration: underline;">conditions d'utilisation</a>
        </label>
      </div>

      <div class="login-actions">
        <button type="submit" class="btn btn-primary">
          Créer un compte
        </button>
        <a href="{{ url_for('login') }}" class="btn btn-outline">Se connecter</a>
      </div>
    </form>

    <div class="alert alert-info" style="margin-top: 1.5rem;">
      <div class="alert-text">Vos données sont protégées conformément à la RGPD.</div>
    </div>
  </div>

</div>
<a href="{{ url_for('home') }}" class="auth-back-btn">← Retour</a>

{% endblock %}
