{% extends 'base.html' %}
{% block title %}Activer la 2FA{% endblock %}
{% block content %}
    <h1>Activer la 2FA</h1>
    {% if qr_url %}
        <p>Secret : {{ secret }}</p>
        <p>Scannez ce code QR avec votre application d'authentification :</p>
        <img src="{{ qr_url }}" alt="Code QR TOTP">
        <h2>Confirmer la 2FA</h2>
        <form method="post" action="{{ url_for('totp_enable_confirm') }}">
            <label>Entrez le code à 6 chiffres de votre application :
                <input type="text" name="code" pattern="\d{6}" maxlength="6" required>
            </label>
            <input type="hidden" name="secret" value="{{ secret }}">
            <input type="hidden" name="qr_url" value="{{ qr_url }}">
            <input type="submit" value="Confirmer">
        </form>
    {% else %}
        <form method="post">
            <input type="submit" value="Activer la 2FA">
        </form>
    {% endif %}
{% endblock %}
