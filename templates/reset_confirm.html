{% extends 'base.html' %}
{% set hide_header = True %}
{% block title %}Nouveau mot de passe{% endblock %}

    {%block css %}
    <!-- CSS components -->
    <link rel="stylesheet" href="{{url_for('static', filename='css/components.css') }}">
    <!-- CSS login -->
    <link rel="stylesheet" href="{{url_for('static', filename='css/pages/login.css') }}">
    {% endblock %}

{% block content %}
<div class="login-grid">

  <div class="login-left">
    <img class="login-logo"
         src="{{ url_for('static', filename='login_logo.png') }}"
         alt="Pupero logo"
         onerror="this.style.display='none'">
  </div>

  <div class="login-right">
    <h1>Nouveau mot de passe</h1>
    <p class="login-info">
      Veuillez saisir votre nouveau mot de passe ci-dessous.
    </p>

    <form method="post" class="login-form">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" name="new_password" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="confirm_password" required minlength="6">
      </div>

      <div class="login-actions">
        <button type="submit" class="btn btn-primary">
          Mettre à jour le mot de passe
        </button>
      </div>
    </form>
  </div>

</div>
<a href="{{ url_for('login') }}" class="auth-back-btn">← Retour à la connexion</a>

{% endblock %}
